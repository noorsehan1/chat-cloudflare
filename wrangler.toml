name = "chat-cloudflare"
main = "index.js"
compatibility_date = "2026-03-20"

# Durable Object binding
[[durable_objects.bindings]]
name = "CHAT_SERVER"
class_name = "ChatServer"

# Migration - For free plan, use new_sqlite_classes
[[migrations]]
tag = "v1"
new_sqlite_classes = ["ChatServer"]

# If you already have v1 deployed and need to update to match v3
# Uncomment these lines:
# [[migrations]]
# tag = "v2"
# new_sqlite_classes = ["ChatServer"]
# 
# [[migrations]]
# tag = "v3"
# new_sqlite_classes = ["ChatServer"]
