name = "chat-cloudflare"
main = "index.js"
compatibility_date = "2026-03-20"

# Durable Object binding
[[durable_objects.bindings]]
name = "CHAT_SERVER"
class_name = "ChatServer"

# Migration - use the correct version based on your deployed state
# If this is a fresh deployment, use v1
[[migrations]]
tag = "v1"
new_classes = ["ChatServer"]

